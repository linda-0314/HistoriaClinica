<div class="login-page">
  <div class="login-card">
    <img src="logo.jpg" alt="Logo" class="logo" />

    <form (ngSubmit)="iniciarSesion()">
      <label>Correo electrónico:</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
      />

      <label>Contraseña:</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
      />

      <button type="submit" class="btn-login">
        Iniciar sesión
      </button>
    </form>
  </div>
</div>
